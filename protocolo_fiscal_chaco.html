<style>

    --rojo: #A32D2D;
    --rojo-bg: #fdf0f0;
    --naranja: #7a4500;
    --naranja-bg: #fef3e2;
    --verde: #2d6a1f;
    --verde-bg: #edf6e8;
    --gris: #f4f4f2;
    --gris-med: #d0cfc8;
    --gris-text: #5a5a56;
    --texto: #1a1a1a;
    --blanco: #ffffff;
    --sombra: 0 2px 12px rgba(12,35,64,0.10);
    --radio: 10px;
    --tab-h: 56px;
    --header-h: 70px;
    --progress-h: 48px;
    --bottom-h: 60px;

  body {
    font-family: -apple-system, 'SF Pro Text', 'Segoe UI', sans-serif;
    background: var(--gris);
    color: var(--texto);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--azul);
    padding: env(safe-area-inset-top, 0) 0 0;
  }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px 10px;
    height: var(--header-h);
  }
  .header-logo {
    display: flex; flex-direction: column;
  }
  .header-sup {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    color: rgba(181,212,244,0.85); text-transform: uppercase;
  }
  .header-title {
    font-size: 18px; font-weight: 700; color: var(--blanco);
    letter-spacing: -0.3px; line-height: 1.2;
  }
  .header-badge {
    background: var(--azul-med); color: var(--blanco);
    font-size: 10px; font-weight: 700; padding: 4px 10px;
    border-radius: 20px; letter-spacing: 0.05em;
  }

  /* ── TABS ── */
  .tabs-wrap {
    position: fixed; z-index: 99;
    left: 0; right: 0;
    top: calc(var(--header-h) + env(safe-area-inset-top, 0));
    background: var(--azul);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tabs {
    display: flex; overflow-x: auto; scrollbar-width: none;
    padding: 0 8px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex: 0 0 auto; padding: 12px 14px;
    font-size: 12px; font-weight: 600;
    color: rgba(181,212,244,0.7);
    background: none; border: none; cursor: pointer;
    border-bottom: 2.5px solid transparent;
    white-space: nowrap; transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .tab.active {
    color: var(--blanco);
    border-bottom-color: #4da6ff;
  }

  /* ── PROGRESS ── */
  .progress-bar {
    position: fixed; z-index: 98;
    left: 0; right: 0;
    top: calc(var(--header-h) + var(--tab-h) + env(safe-area-inset-top, 0));
    background: var(--blanco);
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--gris-med);
    box-shadow: var(--sombra);
  }
  .prog-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .prog-label { font-size: 11px; color: var(--gris-text); font-weight: 500; }
  .prog-count { font-size: 12px; font-weight: 700; color: var(--azul-med); }
  .prog-track {
    height: 5px; background: var(--gris); border-radius: 3px; overflow: hidden;
  }
  .prog-fill {
    height: 100%; background: linear-gradient(90deg, var(--azul-med), #4da6ff);
    border-radius: 3px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }

  /* ── CONTENT ── */
  .content {
    padding-top: calc(var(--header-h) + var(--tab-h) + var(--progress-h) + env(safe-area-inset-top, 0));
    padding-bottom: calc(var(--bottom-h) + env(safe-area-inset-bottom, 0) + 16px);
  }

  /* ── SECCIÓN ── */
  .section { margin: 10px 12px 0; }
  .sec-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--blanco);
    border-radius: var(--radio) var(--radio) 0 0;
    cursor: pointer;
    border: 1px solid var(--gris-med);
    border-bottom: none;
    user-select: none;
    transition: background 0.15s;
  }
  .sec-header:active { background: var(--gris); }
  .sec-header.collapsed {
    border-radius: var(--radio);
    border-bottom: 1px solid var(--gris-med);
    margin-bottom: 2px;

  .sec-name {

  .badge {

  .badge-azul { background: var(--azul-bg); color: var(--azul-med); }
  .chevron {

    transition: transform 0.25s; flex-shrink: 0;
  }
  .chevron.open { transform: rotate(180deg); }

  /* ── ITEMS ── */
  .items-wrap {
    background: var(--blanco);
    border: 1px solid var(--gris-med);
    border-top: none;
    border-radius: 0 0 var(--radio) var(--radio);
    overflow: hidden;
    display: none;
    margin-bottom: 2px;
  }
  .items-wrap.open { display: block; }

  .item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--gris);
    cursor: pointer;
    transition: background 0.1s;
    -webkit-user-select: none; user-select: none;

  .item:last-child { border-bottom: none; }
  .item:active { background: var(--gris); }
  .item.done { background: #f8fdf6; }

  }
  .check-box {
    width: 20px; height: 20px; flex-shrink: 0;
    border: 1.5px solid var(--gris-med);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    background: var(--blanco);
    transition: all 0.15s;
    margin-top: 1px;
  }
  .check-box.checked {
    background: var(--verde); border-color: var(--verde);
  }
  .check-box.checked::after {
    content: '';
    display: block;
    width: 5px; height: 9px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(45deg) translate(-1px, -1px);
  }
  .item-text {
    flex: 1; font-size: 13px; color: var(--texto);
    line-height: 1.45;
  }
  .item-text.done {
    color: var(--gris-text);
    text-decoration: line-through;
    text-decoration-color: var(--gris-med);
  }

    display: inline-block; margin-left: 6px;

    background: var(--rojo-bg); color: var(--rojo);
    letter-spacing: 0.04em;

  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--blanco);
    border-top: 1px solid var(--gris-med);

    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);

  .btn-reset {
    flex: 1; padding: 11px;
    background: none; border: 1.5px solid var(--gris-med);

    font-size: 13px; font-weight: 600; cursor: pointer;

  .install-sub { font-size: 11px; color: rgba(181,212,244,0.85); margin-top: 2px; }
  .install-close {

    font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0;
  }

  .spacer-bottom { height: 8px; }
</style>
</head>

let tab = 'homicidio';
let checks = {};
let allExpanded = false;

function key(t, si, ii) { return t + '_' + si + '_' + ii; }

function save() {}

function switchTab(t, btn) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  allExpanded = false;
  render();
  updateProgress();
  window.scrollTo(0, 0);
}

function toggleSec(sid) {
  const items = document.getElementById('items_' + sid);
  const hdr = document.getElementById('hdr_' + sid);
  const chev = document.getElementById('chev_' + sid);
  const isOpen = items.classList.contains('open');
  items.classList.toggle('open', !isOpen);
  hdr.classList.toggle('collapsed', isOpen);
  chev.classList.toggle('open', !isOpen);
}

function toggleCheck(t, si, ii) {
  const k = key(t, si, ii);
  checks[k] = !checks[k];
  save();
  const box = document.getElementById('b_' + k);
  const txt = document.getElementById('t_' + k);
  const row = document.getElementById('r_' + k);
  box.classList.toggle('checked', checks[k]);
  txt.classList.toggle('done', checks[k]);
  row.classList.toggle('done', checks[k]);
  updateProgress();
}

function updateProgress() {
  const proto = P[tab];
  let tot = 0, done = 0;
  proto.secciones.forEach((s, si) =>
    s.items.forEach((_, ii) => { tot++; if (checks[key(tab, si, ii)]) done++; })
  );
  document.getElementById('prog-count').textContent = done + ' / ' + tot;
  const pct = tot > 0 ? Math.round((done / tot) * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent =
    pct === 100 ? '✓ Protocolo completo' : 'Medidas completadas';
}

function resetTab() {
  showConfirm('¿Limpiar todas las medidas de esta pestaña?', function() {
    const proto = P[tab];
    proto.secciones.forEach((s, si) =>
      s.items.forEach((_, ii) => { checks[key(tab, si, ii)] = false; })
    );
    save();
    render();
    updateProgress();
  });
}

function showConfirm(msg, onOk) {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:16px;padding:24px 20px 20px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <p style="font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:8px;">Limpiar medidas</p>
      <p style="font-size:13px;color:#5a5a56;margin-bottom:20px;line-height:1.5;">${msg}</p>
      <div style="display:flex;gap:10px;">
        <button id="modal-cancel" style="flex:1;padding:11px;background:none;border:1.5px solid #d0cfc8;border-radius:10px;font-size:13px;font-weight:600;color:#5a5a56;cursor:pointer;">Cancelar</button>
        <button id="modal-ok" style="flex:1;padding:11px;background:#A32D2D;border:none;border-radius:10px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;">Limpiar</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById('modal-cancel').onclick = () => document.body.removeChild(overlay);
  document.getElementById('modal-ok').onclick = () => { document.body.removeChild(overlay); onOk(); };
  overlay.onclick = (e) => { if (e.target === overlay) document.body.removeChild(overlay); };
}

function toggleAll() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.items-wrap').forEach(el =>
    el.classList.toggle('open', allExpanded)
  );
  document.querySelectorAll('.sec-header').forEach(el =>
    el.classList.toggle('collapsed', !allExpanded)
  );
  document.querySelectorAll('.chevron').forEach(el =>
    el.classList.toggle('open', allExpanded)
  );
  document.querySelector('.btn-expandir').textContent =
    allExpanded ? 'Colapsar todo' : 'Expandir todo';
}

function render() {
  const proto = P[tab];
  const c = document.getElementById('content');
  c.innerHTML = '';

  proto.secciones.forEach((sec, si) => {
    const sid = tab + '_' + si;
    const isFirst = si === 0;

    const wrap = document.createElement('div');
    wrap.className = 'section';

    // Header
    const hdr = document.createElement('div');
    hdr.className = 'sec-header' + (isFirst ? '' : ' collapsed');
    hdr.id = 'hdr_' + sid;
    hdr.onclick = () => toggleSec(sid);
    hdr.innerHTML = `
      <span class="sec-icon">${sec.ic}</span>
      <div class="sec-info">
        <div class="sec-name">${sec.n}</div>
        <div class="sec-sub">${sec.items.length} medidas</div>
      </div>
      <span class="badge ${sec.bc}">${sec.b}</span>
      <span class="chevron ${isFirst ? 'open' : ''}" id="chev_${sid}">▾</span>
    `;

    // Items
    const itemsWrap = document.createElement('div');
    itemsWrap.className = 'items-wrap' + (isFirst ? ' open' : '');
    itemsWrap.id = 'items_' + sid;

    sec.items.forEach((item, ii) => {
      const k = key(tab, si, ii);
      const isDone = !!checks[k];
      const row = document.createElement('div');
      row.className = 'item' + (isDone ? ' done' : '');
      row.id = 'r_' + k;
      row.onclick = () => toggleCheck(tab, si, ii);
      row.innerHTML = `
        <span class="item-num">${ii + 1}</span>
        <div class="check-box${isDone ? ' checked' : ''}" id="b_${k}"></div>
        <span class="item-text${isDone ? ' done' : ''}" id="t_${k}">
          ${item.t}${item.u ? '<span class="urg-tag">URGENTE</span>' : ''}
        </span>
      `;
      itemsWrap.appendChild(row);
    });

    wrap.appendChild(hdr);
    wrap.appendChild(itemsWrap);
    c.appendChild(wrap);
  });

  const spacer = document.createElement('div');
  spacer.className = 'spacer-bottom';
  c.appendChild(spacer);

  document.querySelector('.btn-expandir').textContent = 'Expandir todo';
}

render();
updateProgress();
</script>
